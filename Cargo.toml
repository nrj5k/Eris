[package]
name = "eris"
version = "0.1.0"
edition = "2024"

[dependencies]
postcard = { version = "1.1", features = ["alloc", "use-crc"] }
burn = { version = "0.20.1", features = ["wgpu", "autodiff", "train"] }
chrono = "0.4.44"
csv = "1.4.0"
gymnasia = "2.0.0"
hashbrown = "0.16.1"
memmap2 = "0.9.10"
rand = "0.10.0"
rand_distr = "0.6.0"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
toml = "0.8"

[dev-dependencies]
approx = "0.5.1"
criterion = "0.8.2"
proptest = "1.11.0"
